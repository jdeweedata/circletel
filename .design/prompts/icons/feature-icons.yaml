      - Simple, friendly
      - Orange accent

  - name: icon-5g.jpg
    type: icon
    folder: icons/features
    prompt: |
      Minimal 5G technology icon.
      - "5G" text stylized
      - Speed lines or signal waves
      - Modern, tech feel
      - Orange accent

  - name: icon-fibre.jpg
    type: icon
    folder: icons/features
    prompt: |
      Minimal fibre optic icon.
      - Fibre cable with light
      - Speed indicator
      - Modern, clean
      - Orange accent
