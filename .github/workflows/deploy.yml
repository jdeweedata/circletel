name: Build & Deploy to Coolify

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'designs/**'
      - 'memory-os/**'
      - 'agent-os/**'
      - 'openspec/**'
      - 'scripts/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Self-hosted runner on VPS (24GB RAM, 8 cores) — GitHub-hosted ubuntu-latest (7GB) OOMs.
    # Setup: /home/actions-runner on the VPS, registered as label "self-hosted".
    runs-on: self-hosted
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Free memory for build
        run: |
          echo "=== Memory before cleanup ==="
          free -h
          # Kill orphan next-server dev processes running outside Docker
          for pid in $(pgrep -f 'next dev' || true); do
            cgroup=$(cat /proc/$pid/cgroup 2>/dev/null || true)
            if echo "$cgroup" | grep -q 'user.slice'; then
              echo "Killing orphan next dev process PID $pid"
              kill "$pid" 2>/dev/null || true
            fi
          done
          # Kill IDE server (antigravity) — uses 13-15GB; auto-restarts on reconnect
          if pgrep -f 'antigravity-server' > /dev/null 2>&1; then
            echo "Stopping antigravity-server to free memory for build..."
            pkill -f 'antigravity-server' || true
          fi
          # Kill headless Chrome instances (Chrome DevTools MCP, screenshots)
          if pgrep -f 'chrome.*headless' > /dev/null 2>&1; then
            echo "Stopping headless Chrome instances..."
            pkill -f 'chrome.*headless' || true
          fi
          if pgrep -f 'chrome-devtools-mcp' > /dev/null 2>&1; then
            echo "Stopping Chrome DevTools MCP servers..."
            pkill -f 'chrome-devtools-mcp' || true
          fi
          # Kill orphan next-server production processes outside Docker
          for pid in $(pgrep -f 'next-server' || true); do
            cgroup=$(cat /proc/$pid/cgroup 2>/dev/null || true)
            if echo "$cgroup" | grep -q 'user.slice'; then
              echo "Killing orphan next-server process PID $pid"
              kill "$pid" 2>/dev/null || true
            fi
          done
          sleep 3
          # Drop filesystem caches
          sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
          echo "=== Memory after cleanup ==="
          free -h

      - name: Check disk space and cleanup
        run: |
          echo "=== Disk usage ==="
          df -h /
          AVAIL_MB=$(df --output=avail -BM / | tail -1 | tr -d ' M')
          echo "Available: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 8000 ]; then
            echo "Low disk — running cleanup..."
            docker image prune -f
            docker builder prune -f
            npm cache clean --force 2>/dev/null || true
            journalctl --vacuum-size=100M 2>/dev/null || true
            rm -rf /tmp/buildx-cache /tmp/com.google.Chrome.scoped_dir.* 2>/dev/null || true
            rm -rf /root/.cache/ms-playwright/ /root/.cache/typescript/ 2>/dev/null || true
            find /home/actions-runner/_diag/ -name "*.log" -mtime +1 -delete 2>/dev/null || true
            AVAIL_MB=$(df --output=avail -BM / | tail -1 | tr -d ' M')
            echo "After cleanup: ${AVAIL_MB}MB available"
          fi
          if [ "$AVAIL_MB" -lt 4000 ]; then
            echo "::error::FATAL: Only ${AVAIL_MB}MB disk space available — need at least 4GB for build"
            exit 1
          fi
          echo "Disk space OK: ${AVAIL_MB}MB available"

      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules between runs — tar is ~3x faster than rsync for 150k+ small files.
      - name: Cache node_modules
        id: nm-cache
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          CACHE_KEY_FILE=/home/actions-runner/.nm-cache-key
          CACHE_TAR=/home/actions-runner/node_modules.tar
          if [ -f "$CACHE_TAR" ] && [ -f "$CACHE_KEY_FILE" ] && [ "$(cat $CACHE_KEY_FILE)" = "$LOCK_HASH" ]; then
            tar -xf "$CACHE_TAR"
            echo "hit=true" >> $GITHUB_OUTPUT
            echo "node_modules restored from tar cache"
          else
            echo "hit=false" >> $GITHUB_OUTPUT
            echo "Cache miss — will reinstall"
          fi

      - name: Install dependencies
        if: steps.nm-cache.outputs.hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Save node_modules cache
        if: steps.nm-cache.outputs.hit != 'true'
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          tar -cf /home/actions-runner/node_modules.tar node_modules/
          echo "$LOCK_HASH" > /home/actions-runner/.nm-cache-key
          echo "node_modules cached as tar"

      # Restore the Next.js SWC/webpack compile cache from a fixed VPS path.
      # rsync --checksum skips unchanged files — much faster than rm+cp on 2.4GB cache.
      - name: Restore Next.js SWC cache
        run: |
          if [ -d /home/actions-runner/.next-cache ]; then
            mkdir -p .next/cache
            rsync -a /home/actions-runner/.next-cache/ .next/cache/
            echo "Cache restored ($(du -sh .next/cache | cut -f1))"
          else
            echo "No cache found — cold build"
          fi

      - name: Build Next.js
        run: NODE_OPTIONS='--max-old-space-size=12288' npm run build
        env:
          SELF_HOSTED: 'true'
          # 24GB VPS has headroom for parallel webpack workers — un-throttle from 1 CPU.
          # Lower this if the build OOMs (watch `free -h` in the build logs).
          BUILD_CPUS: '4'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          NEXT_PUBLIC_APP_URL: https://www.circletel.co.za
          NEXT_PUBLIC_BASE_URL: https://www.circletel.co.za
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_NETCASH_SERVICE_KEY: ${{ secrets.NEXT_PUBLIC_NETCASH_SERVICE_KEY }}
          NEXT_PUBLIC_NETCASH_PCI_VAULT_KEY: ${{ secrets.NEXT_PUBLIC_NETCASH_PCI_VAULT_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: 7iqq2t7l
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_TELEMETRY_DISABLED: 1
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      # Save the SWC cache — rsync only writes changed files, skips unchanged.
      - name: Save Next.js SWC cache
        run: |
          mkdir -p /home/actions-runner/.next-cache
          timeout 120 rsync -a --delete .next/cache/ /home/actions-runner/.next-cache/ || echo "Cache save timed out — skipping"
          echo "Cache saved ($(du -sh /home/actions-runner/.next-cache | cut -f1))"

      # Build Docker image locally — no GHCR push/pull since runner IS the production VPS.
      # --no-cache prevents Docker from reusing cached COPY layers, which was the root
      # cause of stale .next/standalone output being served after fresh npm run build.
      # Tag as :latest AND :<git-sha> so the verification step can prove the exact image.
      - name: Build Docker image
        run: |
          IMAGE="ghcr.io/jdeweedata/circletel"
          docker build --no-cache \
            --build-arg GIT_COMMIT_SHA="${{ github.sha }}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            .

      # Verify the image commit SHA before deploying — catches stale builds early.
      - name: Verify image commit
        run: |
          EXPECTED="${{ github.sha }}"
          ACTUAL=$(docker run --rm --entrypoint cat ghcr.io/jdeweedata/circletel:latest /app/COMMIT_SHA.txt 2>/dev/null || echo "MISSING")
          if [ "$ACTUAL" = "MISSING" ]; then
            echo "::warning::No COMMIT_SHA.txt in image — cannot verify commit. Non-fatal."
          elif [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Image contains commit $ACTUAL but expected $EXPECTED — refusing to deploy stale image"
            exit 1
          else
            echo "Image commit $ACTUAL matches expected $EXPECTED ✓"
          fi

      # Restart the Coolify-managed container with the new image.
      # --no-build: skip build (we just built it) — saves time.
      # --pull never: never pull from registry — ensures only our locally-built image is used.
      - name: Deploy container
        run: |
          cd /data/coolify/applications/b7ukn3c76rd46dsl19oqq59e
          docker compose up -d --force-recreate --no-build --pull never

      - name: Wait for healthy container
        run: |
          # Resolve container name dynamically — Coolify regenerates the suffix on recreate.
          CONTAINER=$(docker ps --filter "label=coolify.name=b7ukn3c76rd46dsl19oqq59e" --format '{{.Names}}' | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "ERROR: No running container found with coolify.name=b7ukn3c76rd46dsl19oqq59e"
            docker ps -a --filter "label=coolify.managed=true" --format '{{.Names}} {{.Status}}'
            exit 1
          fi
          echo "Found container: $CONTAINER"
          echo "Waiting for health check..."
          for i in $(seq 1 40); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "not found")
            echo "$(date +%H:%M:%S) — $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: Container did not become healthy within 200s"
          docker logs --tail 50 "$CONTAINER"
          exit 1
