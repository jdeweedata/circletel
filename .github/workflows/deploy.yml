name: Build & Deploy to Coolify

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    # Self-hosted runner on VPS 30 (24GB RAM) — GitHub-hosted ubuntu-latest (7GB) OOMs.
    # Setup: /home/actions-runner on the VPS, registered as label "self-hosted".
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use a persistent BuildKit daemon so --mount=type=cache persists between builds
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/jdeweedata/circletel:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            NEXT_PUBLIC_APP_URL=https://www.circletel.co.za
            NEXT_PUBLIC_BASE_URL=https://www.circletel.co.za
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_NETCASH_SERVICE_KEY=${{ secrets.NEXT_PUBLIC_NETCASH_SERVICE_KEY }}
            NEXT_PUBLIC_NETCASH_PCI_VAULT_KEY=${{ secrets.NEXT_PUBLIC_NETCASH_PCI_VAULT_KEY }}
            NEXT_PUBLIC_SANITY_PROJECT_ID=7iqq2t7l
            NEXT_PUBLIC_SANITY_DATASET=production
          # type=local keeps layer cache on VPS disk — no network round-trip to GitHub servers.
          # On cache miss the first build is cold; every subsequent build is fast.
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max

      # Rotate cache: replace old with new to prevent unbounded growth
      - name: Rotate build cache
        run: |
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache 2>/dev/null || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Coolify deploy webhook
        run: |
          curl -sfX GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
