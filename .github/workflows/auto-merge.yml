name: Auto Merge Approved PRs

# Triggers when PR is approved or checks pass
on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number }}
  cancel-in-progress: true

# Grant permissions to merge PRs
permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Only run if review is approved
    if: github.event.review.state == 'approved' || github.event.check_suite.conclusion == 'success'

    steps:
      - name: Auto-merge PR
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: "automerge"
          MERGE_METHOD: "squash" # Use squash merge
          MERGE_COMMIT_MESSAGE: "pull-request-title-and-description"
          MERGE_RETRIES: 6
          MERGE_RETRY_SLEEP: 10000 # Wait 10 seconds between retries
          UPDATE_LABELS: ""
          UPDATE_METHOD: "rebase"

      - name: Comment on successful merge
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR Auto-Merged Successfully!**\n\n' +
                    'Production deployment is now in progress:\n' +
                    '👉 https://www.circletel.co.za\n\n' +
                    'Monitor at: https://www.circletel.co.za'
            })
