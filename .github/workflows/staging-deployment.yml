name: Auto Deploy to Staging

# Triggers when PR is opened or updated
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: staging-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Grant write permissions to push to branches
permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-to-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to staging branch
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git push origin HEAD:staging --force

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Staging Deployment Triggered**\n\n' +
                    'Changes pushed to the `staging` branch — Coolify will pick these up automatically.\n\n' +
                    'Production URL: 👉 https://www.circletel.co.za'
            })
