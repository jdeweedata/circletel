<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CircleTel Diagram Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  .loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; font-family: system-ui, sans-serif; color: #1B2A4A;
  }
  .loading h2 { margin-bottom: 12px; font-size: 20px; }
  .loading p { color: #666; font-size: 14px; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #E87A1E33;
    border-top-color: #E87A1E; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #dc2626; }
  .error h2 { color: #dc2626; }
  .index {
    max-width: 600px; margin: 60px auto; padding: 0 20px;
    font-family: system-ui, sans-serif; color: #1B2A4A;
  }
  .index h1 { font-size: 24px; margin-bottom: 8px; }
  .index p { color: #666; margin-bottom: 24px; }
  .index ul { list-style: none; }
  .index li { margin-bottom: 12px; }
  .index a {
    display: flex; align-items: center; padding: 12px 16px;
    background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px;
    text-decoration: none; color: #1B2A4A; font-weight: 500;
    transition: border-color 0.2s, background 0.2s;
  }
  .index a:hover { border-color: #E87A1E; background: #fff4e6; }
  .index .meta { margin-left: auto; font-size: 12px; color: #999; font-weight: 400; }
</style>
</head>
<body>
<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <h2>Loading diagram...</h2>
    <p>Fetching from CircleTel API</p>
  </div>
</div>

<script type="module">
import React from "https://esm.sh/react@18.3.1";
import ReactDOM from "https://esm.sh/react-dom@18.3.1/client";
import { Excalidraw } from "https://esm.sh/@excalidraw/excalidraw@0.18.1?external=react,react-dom&alias=react:react@18.3.1,react-dom:react-dom@18.3.1";

const root = document.getElementById("root");
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || window.location.pathname.split("/").filter(Boolean).pop();

if (!name || name === "viewer.html") {
  fetch("/api/excalidraw")
    .then(r => r.json())
    .then(data => {
      root.innerHTML = "";
      const div = document.createElement("div");
      div.className = "index";
      div.innerHTML = `
        <h1>CircleTel Diagrams</h1>
        <p>Click a diagram to open it in the interactive editor</p>
        <ul>
          ${data.diagrams.map(d => `
            <li>
              <a href="/diagrams/viewer.html?name=${d.name}">
                ${d.name.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase())}
                <span class="meta">View &rarr;</span>
              </a>
            </li>
          `).join("")}
        </ul>
      `;
      root.appendChild(div);
    })
    .catch(() => {
      root.innerHTML = '<div class="loading error"><h2>Failed to load diagram list</h2></div>';
    });
} else {
  fetch(`/api/excalidraw/${name}`)
    .then(r => {
      if (!r.ok) throw new Error(`Diagram "${name}" not found`);
      return r.json();
    })
    .then(scene => {
      document.title = `${name.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase())} — CircleTel`;
      root.innerHTML = "";

      const container = document.createElement("div");
      container.style.cssText = "width:100%;height:100%;";
      root.appendChild(container);

      const reactRoot = ReactDOM.createRoot(container);
      reactRoot.render(
        React.createElement(Excalidraw, {
          initialData: {
            elements: scene.elements || [],
            appState: {
              ...(scene.appState || {}),
              viewBackgroundColor: scene.appState?.viewBackgroundColor || "#ffffff",
            },
            files: scene.files || {},
          },
          UIOptions: {
            canvasActions: {
              export: { saveFileToDisk: true },
            },
          },
        })
      );
    })
    .catch(err => {
      root.innerHTML = `
        <div class="loading error">
          <h2>Failed to load diagram</h2>
          <p>${err.message}</p>
          <p style="margin-top:12px"><a href="/diagrams/viewer.html">← Back to diagram list</a></p>
        </div>
      `;
    });
}
</script>
</body>
</html>
