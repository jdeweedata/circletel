<rect x="40" y="280" width="100" height="30" fill="#E87A1E" stroke="#E87A1E" stroke-width="1" rx="8" />
<text x="90" y="295" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 1</text>
<rect x="40" y="320" width="740" height="100" fill="#fff4e6" stroke="#E87A1E" stroke-width="2" rx="8" />
<text x="210" y="342.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Request Quote (SLA: 48h)</text>
<text x="410" y="387.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#495057">Company details → Select SMME/Enterprise → Choose packages
→ Contract term (12/24/36 mo) → Accept consents → Submit (BQ-YYYY-NNN)</text>
<line x1="410" y1="420" x2="410" y2="470" stroke="#E87A1E" stroke-width="2" marker-end="url(#ah)" />
<text x="520" y="445" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#868e96">Admin review + approve</text>
<rect x="40" y="480" width="100" height="30" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" rx="8" />
<text x="90" y="495" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 2</text>
<rect x="40" y="520" width="740" height="100" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="8" />
<text x="260" y="542.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Business Verification — KYC (SLA: 72h)</text>
<text x="410" y="587.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#495057">Didit KYC (type: sme) → CIPC cert + Director ID + Proof of address
→ VAT cert (Enterprise required, SMME optional) → 2-3 min verification</text>
<line x1="410" y1="620" x2="410" y2="670" stroke="#f59e0b" stroke-width="2" marker-end="url(#ah)" />
<rect x="40" y="680" width="100" height="30" fill="#1B2A4A" stroke="#1B2A4A" stroke-width="1" rx="8" />
<text x="90" y="695" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 3</text>
<rect x="40" y="720" width="740" height="130" fill="#e7f5ff" stroke="#1B2A4A" stroke-width="2" rx="8" />
<text x="210" y="742.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Site Details (SLA: 48h)</text>
<rect x="60" y="765" width="330" height="70" fill="#dbeafe" stroke="#3B82F6" stroke-width="2" rx="8" />
<text x="225" y="800" text-anchor="middle" dominant-baseline="central" font-size="13" font-family="sans-serif" fill="#1B2A4A">SMME (simplified)
Property type + contact only
Site photos optional, no RFI</text>
<rect x="420" y="765" width="340" height="70" fill="#e2e8f0" stroke="#1B2A4A" stroke-width="2" rx="8" />
<text x="590" y="800" text-anchor="middle" dominant-baseline="central" font-size="13" font-family="sans-serif" fill="#1B2A4A">Enterprise (full)
Property + photos + RFI checklist
Building access + manager contact</text>
<line x1="410" y1="850" x2="410" y2="900" stroke="#1B2A4A" stroke-width="2" marker-end="url(#ah)" />
<rect x="40" y="910" width="100" height="30" fill="#1B2A4A" stroke="#1B2A4A" stroke-width="1" rx="8" />
<text x="90" y="925" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 4</text>
<rect x="40" y="950" width="740" height="100" fill="#e7f5ff" stroke="#1B2A4A" stroke-width="2" rx="8" />
<text x="210" y="972.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Contract (SLA: 48h)</text>
<text x="410" y="1017.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#495057">Generate contract (CT-YYYY-NNN) → Send for Zoho Sign e-signature
→ Customer reviews terms, pricing, SLA → Digital signature via webhook</text>
<line x1="410" y1="1050" x2="410" y2="1100" stroke="#1B2A4A" stroke-width="2" marker-end="url(#ah)" />
<rect x="40" y="1110" width="100" height="30" fill="#1B2A4A" stroke="#1B2A4A" stroke-width="1" rx="8" />
<text x="90" y="1125" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 5</text>
<rect x="40" y="1150" width="740" height="100" fill="#e7f5ff" stroke="#1B2A4A" stroke-width="2" rx="8" />
<text x="210" y="1172.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Installation (SLA: 7 days)</text>
<text x="410" y="1217.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#495057">Technician assigned → On-site fibre installation
→ Equipment configured &amp; tested → 3-7 business days</text>
<line x1="410" y1="1250" x2="410" y2="1300" stroke="#1B2A4A" stroke-width="2" marker-end="url(#ah)" />
<rect x="40" y="1310" width="100" height="30" fill="#4CAF50" stroke="#4CAF50" stroke-width="1" rx="8" />
<text x="90" y="1325" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#ffffff">STAGE 6</text>
<rect x="40" y="1350" width="740" height="100" fill="#ecfdf5" stroke="#4CAF50" stroke-width="2" rx="8" />
<text x="210" y="1372.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#1B2A4A">Go Live (SLA: 24h)</text>
<text x="410" y="1417.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#495057">RICA submission → Credentials generated → Service activated
→ Business dashboard live at /business/dashboard</text>
<rect x="40" y="1490" width="740" height="80" fill="#f8f9fa" stroke="#868e96" stroke-width="2" rx="8" />
<text x="210" y="1512.5" text-anchor="middle" dominant-baseline="central" font-size="20" font-family="sans-serif" fill="#495057">Ongoing Management</text>
<text x="410" y="1542.5" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#868e96">Invoices (auto-generated 25th) • Support tickets (Zoho Desk) • Service monitoring</text>
<line x1="410" y1="1450" x2="410" y2="1490" stroke="#4CAF50" stroke-width="2" marker-end="url(#ah)" />
<rect x="850" y="320" width="250" height="260" fill="#fff4e6" stroke="#E87A1E" stroke-width="2" rx="8" />
<text x="975" y="342.5" text-anchor="middle" dominant-baseline="central" font-size="18" font-family="sans-serif" fill="#E87A1E">Business Dashboard</text>
