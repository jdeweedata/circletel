<text x="820" y="357.5" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="sans-serif" fill="#868e96">parallel</text>
<rect x="850" y="620" width="250" height="180" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="8" />
<text x="920" y="640" text-anchor="middle" dominant-baseline="central" font-size="16" font-family="sans-serif" fill="#1B2A4A">Legend</text>
<text x="975" y="725" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#495057">Orange = Customer-initiated
Navy = Admin-managed
Amber = KYC verification
Blue = SMME simplified
Green = Service active
Dashed = Parallel track

ID formats:
  Quote: BQ-YYYY-NNN
  Contract: CT-YYYY-NNN</text>
